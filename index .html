<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Smart Parking System</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#e5e7eb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:420px;
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    margin-bottom:8px;
    font-size:30px;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:25px;
    background:#f1f5f9;
    padding:18px;
    border-radius:12px;
    line-height:1.8;
}

.status{
    font-size:22px;
    font-weight:bold;
}

.available{
    color:green;
}

.occupied{
    color:red;
}

.ai-box{
    margin-top:20px;
    background:#ede9fe;
    padding:15px;
    border-radius:12px;
}

</style>
</head>

<body>

<div class="container">

<h1>🚗 Smart Parking</h1>

<div class="subtitle">
AI Future Slot Prediction
</div>

<input type="text" placeholder="Enter Vehicle Number">

<input type="text" placeholder="Enter Parking Area">

<button onclick="checkParking()">
Check Parking Slot
</button>

<div class="result" id="result">

<p>
Enter details and click button
</p>

</div>

<div class="ai-box">

<h3>🤖 AI Logic</h3>

<p>
AI predicts parking slot availability using vehicle detection and future slot prediction.
</p>

</div>

</div>

<script>

function checkParking(){

    let random = Math.floor(Math.random()*2);

    if(random == 0){

        document.getElementById("result").innerHTML = `

        <div class="status available">
        ✅ SLOT AVAILABLE
        </div>

        <p>Parking Slot: A12</p>

        <p>Prediction: Free for next 25 mins</p>

        <p>Distance: 120 meters</p>

        `;

    }

    else{

        document.getElementById("result").innerHTML = `

        <div class="status occupied">
        ❌ SLOT OCCUPIED
        </div>

        <p>Nearest Free Slot: B07</p>

        <p>Available in: 10 mins</p>

        <p>AI Suggested Alternative Slot</p>

        `;

    }

}

</script>

</body>
</html>
