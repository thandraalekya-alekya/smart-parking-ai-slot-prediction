<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Smart Parking System</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#38bdf8;
    }

    .dashboard{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.3);
    }

    .card h2{
      margin-bottom:10px;
      color:#38bdf8;
    }

    .parking-section{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      margin-bottom:25px;
    }

    .parking-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:15px;
      margin-top:20px;
    }

    .slot{
      padding:25px;
      border-radius:10px;
      text-align:center;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .free{
      background:#22c55e;
    }

    .occupied{
      background:#ef4444;
    }

    .predicted{
      background:#f59e0b;
    }

    button{
      margin-top:20px;
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#38bdf8;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#0ea5e9;
    }

    .chart-section{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
    }

    canvas{
      background:white;
      border-radius:10px;
      padding:10px;
    }

    footer{
      text-align:center;
      margin-top:30px;
      color:#94a3b8;
    }

    @media(max-width:700px){

      .parking-grid{
        grid-template-columns:repeat(2,1fr);
      }

    }

  </style>
</head>

<body>

  <h1>🚗 AI Smart Parking System</h1>

  <div class="dashboard">

    <div class="card">
      <h2>Total Slots</h2>
      <h1 id="totalSlots">20</h1>
    </div>

    <div class="card">
      <h2>Available Slots</h2>
      <h1 id="availableSlots">0</h1>
    </div>

    <div class="card">
      <h2>AI Predicted Free Slots</h2>
      <h1 id="predictedSlots">0</h1>
    </div>

  </div>

  <div class="parking-section">

    <h2>Parking Slots</h2>

    <div class="parking-grid" id="parkingGrid"></div>

  </div>

  <div class="chart-section">

    <h2>Future Parking Prediction</h2>

    <canvas id="chart"></canvas>

    <button onclick="runPrediction()">
      Run AI Prediction
    </button>

  </div>

  <footer>
    Smart Parking System with AI Prediction
  </footer>

<script>

  const totalSlots = 20;

  const parkingGrid =
  document.getElementById("parkingGrid");

  let slots = [];

  function createSlots(){

    slots = [];

    for(let i=1;i<=totalSlots;i++){

      slots.push({
        id:i,
        occupied:Math.random() > 0.5
      });

    }

    renderSlots();
  }

  function renderSlots(){

    parkingGrid.innerHTML = "";

    slots.forEach((slot,index)=>{

      const div =
      document.createElement("div");

      div.classList.add("slot");

      if(slot.occupied){
        div.classList.add("occupied");
      }else{
        div.classList.add("free");
      }

      div.innerHTML = `
        Slot ${slot.id}<br>
        ${slot.occupied ? "Occupied" : "Free"}
      `;

      div.onclick = ()=>{
        toggleSlot(index);
      };

      parkingGrid.appendChild(div);

    });

    updateStats();
  }

  function toggleSlot(index){

    slots[index].occupied =
    !slots[index].occupied;

    renderSlots();
  }

  function updateStats(){

    const available =
    slots.filter(
      slot => !slot.occupied
    ).length;

    document.getElementById(
      "availableSlots"
    ).innerText = available;
  }

  function runPrediction(){

    let predicted = 0;

    const slotElements =
    document.querySelectorAll(".slot");

    slotElements.forEach((div)=>{

      div.classList.remove("predicted");

      if(Math.random() > 0.8){

        div.classList.add("predicted");

        predicted++;
      }

    });

    document.getElementById(
      "predictedSlots"
    ).innerText = predicted;

    generateChart();
  }

  function generateChart(){

    const labels = [];
    const values = [];

    for(let i=1;i<=12;i++){

      labels.push(i + " PM");

      values.push(
        Math.floor(
          Math.random() * totalSlots
        )
      );

    }

    const ctx =
    document.getElementById("chart");

    if(window.chartInstance){
      window.chartInstance.destroy();
    }

    window.chartInstance =
    new Chart(ctx,{

      type:"line",

      data:{

        labels:labels,

        datasets:[{

          label:"Predicted Occupancy",

          data:values,

          borderColor:"#38bdf8",

          backgroundColor:
          "rgba(56,189,248,0.2)",

          fill:true,

          tension:0.4

        }]

      },

      options:{

        responsive:true,

        plugins:{
          legend:{
            labels:{
              color:"black"
            }
          }
        },

        scales:{
          y:{
            beginAtZero:true
          }
        }

      }

    });

  }

  createSlots();

</script>

</body>
</html>
