<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AI Smart Parking System</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f7fb;
    }

    header{
      background:#007bff;
      color:white;
      padding:20px;
      text-align:center;
    }

    header h1{
      font-size:32px;
    }

    .container{
      width:90%;
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    .dashboard{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .card h2{
      margin-bottom:10px;
      color:#333;
    }

    .card p{
      font-size:28px;
      font-weight:bold;
      color:#007bff;
    }

    .parking-section{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .parking-section h2{
      margin-bottom:20px;
      text-align:center;
      color:#333;
    }

    .parking-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:20px;
    }

    .slot{
      height:100px;
      border-radius:12px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:white;
      font-weight:bold;
      transition:0.3s;
      cursor:pointer;
    }

    .slot:hover{
      transform:scale(1.05);
    }

    .free{
      background:#28a745;
    }

    .occupied{
      background:#dc3545;
    }

    .predicted{
      background:#ff9800;
    }

    .controls{
      text-align:center;
      margin-top:30px;
    }

    button{
      padding:12px 25px;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0056b3;
    }

    .prediction-box{
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
      color:#333;
    }

    footer{
      margin-top:40px;
      background:#007bff;
      color:white;
      text-align:center;
      padding:15px;
    }

    @media(max-width:600px){
      header h1{
        font-size:24px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>🚗 AI Smart Parking System</h1>
  <p>Future Slot Prediction using AI Logic</p>
</header>

<div class="container">

  <!-- Dashboard -->
  <div class="dashboard">

    <div class="card">
      <h2>Total Slots</h2>
      <p id="totalSlots">12</p>
    </div>

    <div class="card">
      <h2>Occupied</h2>
      <p id="occupiedCount">0</p>
    </div>

    <div class="card">
      <h2>Available</h2>
      <p id="availableCount">0</p>
    </div>

  </div>

  <!-- Parking Section -->
  <div class="parking-section">

    <h2>Parking Area</h2>

    <div class="parking-grid" id="parkingGrid">
    </div>

    <div class="controls">

      <button onclick="predictSlot()">
        Predict Future Free Slot
      </button>

      <div class="prediction-box" id="predictionText">
        AI prediction will appear here...
      </div>

    </div>

  </div>

</div>

<footer>
  <p>© 2026 AI Smart Parking System | GitHub Pages Ready</p>
</footer>

<script>

  const totalSlots = 12;

  const parkingGrid = document.getElementById("parkingGrid");

  let occupied = 0;
  let available = 0;

  // Store slot data
  let slots = [];

  // Generate parking slots
  for(let i = 1; i <= totalSlots; i++){

    const slot = document.createElement("div");

    slot.classList.add("slot");

    // Random availability
    let isFree = Math.random() > 0.5;

    if(isFree){

      slot.classList.add("free");
      slot.innerHTML = `
        <h3>Slot ${i}</h3>
        <p>FREE</p>
      `;

      available++;

      slots.push({
        id:i,
        status:"free"
      });

    }else{

      slot.classList.add("occupied");
      slot.innerHTML = `
        <h3>Slot ${i}</h3>
        <p>BUSY</p>
      `;

      occupied++;

      slots.push({
        id:i,
        status:"busy"
      });
    }

    // Click to toggle slot
    slot.addEventListener("click", function(){

      if(slot.classList.contains("free")){

        slot.classList.remove("free");
        slot.classList.add("occupied");

        slot.innerHTML = `
          <h3>Slot ${i}</h3>
          <p>BUSY</p>
        `;

      }else{

        slot.classList.remove("occupied");
        slot.classList.add("free");

        slot.innerHTML = `
          <h3>Slot ${i}</h3>
          <p>FREE</p>
        `;
      }

      updateCounts();
    });

    parkingGrid.appendChild(slot);
  }

  // Update dashboard counts
  function updateCounts(){

    const freeSlots =
      document.querySelectorAll(".free").length;

    const occupiedSlots =
      document.querySelectorAll(".occupied").length;

    document.getElementById("availableCount")
      .innerText = freeSlots;

    document.getElementById("occupiedCount")
      .innerText = occupiedSlots;
  }

  updateCounts();

  // AI prediction logic
  function predictSlot(){

    const freeSlotElements =
      document.querySelectorAll(".free");

    if(freeSlotElements.length === 0){

      document.getElementById("predictionText")
        .innerHTML =
        "❌ No free slots predicted.";

      return;
    }

    // Random AI prediction
    const randomIndex =
      Math.floor(Math.random() *
      freeSlotElements.length);

    const selectedSlot =
      freeSlotElements[randomIndex];

    // Remove old prediction
    document.querySelectorAll(".predicted")
      .forEach(slot => {
        slot.classList.remove("predicted");
      });

    selectedSlot.classList.add("predicted");

    const slotName =
      selectedSlot.querySelector("h3").innerText;

    document.getElementById("predictionText")
      .innerHTML =
      `✅ AI predicts ${slotName} will stay free for the next 30 minutes.`;
  }

</script>

</body>
</html>
